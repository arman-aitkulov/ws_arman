<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Вишлист подарков</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { margin-bottom: 4px; }
  .hint { color: #666; font-size: 14px; margin-top: 0; }
  form { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0; padding: 16px; background: #f6f6f6; border-radius: 8px; }
  input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1 1 160px; }
  button { padding: 8px 14px; border: none; border-radius: 4px; background: #333; color: white; cursor: pointer; }
  button:hover { background: #555; }
  button.link-btn { background: none; color: #2563eb; padding: 0; text-decoration: underline; }
  form button { flex: 1 1 100%; }
  ul { list-style: none; padding: 0; }
  li { border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px; margin: 10px 0; }
  li.booked { background: #f9f9f9; opacity: 0.75; }
  .item-name { font-weight: 600; font-size: 16px; }
  .item-price { color: #666; margin-left: 6px; }
  .item-comment { color: #555; font-size: 14px; margin: 4px 0; }
  .item-link { display: inline-block; margin: 6px 0; font-size: 14px; }
  .booked-tag { color: #b45309; font-size: 14px; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .row input { flex: 1 1 140px; }
  .share-box { background: #eef6ff; border: 1px solid #cfe4fb; border-radius: 8px; padding: 12px; margin: 16px 0; font-size: 14px; }
  .share-box input { width: 100%; margin-top: 6px; box-sizing: border-box; background: white; }
  .footer-link { margin-top: 32px; font-size: 14px; }
  .footer-link a { color: #555; }
  .auth-status { font-size: 14px; color: #555; margin-bottom: 16px; }
  .tabs { display: flex; gap: 16px; margin-bottom: 8px; }
  .tabs button { background: none; color: #666; padding: 4px 0; border-bottom: 2px solid transparent; }
  .tabs button.active { color: #222; border-bottom-color: #333; font-weight: 600; }
  .auth-note { font-size: 13px; color: #666; }
</style>
</head>
<body>

  <div id="home" hidden>
    <h1>🎁 Вишлист подарков</h1>
    <p class="hint">Войдите или зарегистрируйтесь, чтобы создать свой список подарков и поделиться ссылкой с друзьями.</p>

    <div class="tabs">
      <button id="tab-login" class="active" onclick="switchTab('login')">Вход</button>
      <button id="tab-signup" onclick="switchTab('signup')">Регистрация</button>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <input id="login-email" type="email" placeholder="Email" required />
      <input id="login-password" type="password" placeholder="Пароль" required />
      <button type="submit">Войти</button>
    </form>

    <form id="signup-form" onsubmit="handleSignup(event)" hidden>
      <input id="signup-name" placeholder="Ваше имя" required />
      <input id="signup-email" type="email" placeholder="Email" required />
      <input id="signup-password" type="password" placeholder="Пароль (мин. 6 символов)" required minlength="6" />
      <button type="submit">Зарегистрироваться</button>
    </form>

    <p id="auth-message" class="auth-note"></p>
  </div>

  <div id="app" hidden>
    <p id="auth-status" class="auth-status"></p>

    <h1 id="app-title">🎁 Вишлист</h1>
    <p class="hint">Список подарков. Забронируйте подарок, чтобы друзья знали, что он уже занят.</p>

    <div id="share-box" class="share-box" hidden>
      Поделитесь этой ссылкой с друзьями, чтобы они могли бронировать подарки:
      <input id="share-link" readonly onclick="this.select()" />
    </div>

    <form id="add-form" onsubmit="addItem(event)" hidden>
      <input id="name" placeholder="Название подарка" required />
      <input id="link" placeholder="Ссылка на товар" />
      <input id="price" placeholder="Цена (необязательно)" />
      <input id="comment" placeholder="Комментарий (цвет, размер...)" />
      <button type="submit">Добавить подарок</button>
    </form>

    <ul id="list"></ul>

    <p class="footer-link"><a href="index.html">На главную →</a></p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Filled in once for the whole workshop — same for every participant.
  const SUPABASE_URL = "https://ospzdrbiwlwvmrfjokee.supabase.co";
  const SUPABASE_KEY = "sb_publishable_IiTOhk0_H-y5KzC3qhRiBg_UMgFRnz8";

  const PARTICIPANT_ID = "eovaq7";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const LIST_ID = new URLSearchParams(location.search).get("list");
  let session = null;
  let isOwner = false;

  async function init() {
    const { data } = await client.auth.getSession();
    session = data.session;

    client.auth.onAuthStateChange((_event, newSession) => {
      session = newSession;
      render();
    });

    render();
  }

  function switchTab(tab) {
    document.getElementById("tab-login").classList.toggle("active", tab === "login");
    document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
    document.getElementById("login-form").hidden = tab !== "login";
    document.getElementById("signup-form").hidden = tab !== "signup";
    document.getElementById("auth-message").textContent = "";
  }

  async function handleSignup(event) {
    event.preventDefault();
    const name = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const password = document.getElementById("signup-password").value;

    const { data, error } = await client.auth.signUp({
      email,
      password,
      options: {
        data: { display_name: name },
        emailRedirectTo: location.origin + location.pathname,
      },
    });

    const msg = document.getElementById("auth-message");
    if (error) {
      msg.textContent = "Ошибка регистрации: " + error.message;
      return;
    }

    if (data.session) {
      // Email confirmation is off for this project — logged in right away.
      session = data.session;
      await ensureListMeta();
      location.href = `?list=${session.user.id}`;
    } else {
      msg.textContent = `Письмо для подтверждения отправлено на ${email}. Перейдите по ссылке в письме, потом войдите на вкладке «Вход».`;
    }
  }

  async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    const msg = document.getElementById("auth-message");
    if (error) {
      msg.textContent = "Ошибка входа: " + error.message;
      return;
    }

    session = data.session;
    await ensureListMeta();
    location.href = `?list=${session.user.id}`;
  }

  async function logout() {
    await client.auth.signOut();
    location.href = "index.html";
  }

  async function ensureListMeta() {
    if (!session) return;
    const ownerId = session.user.id;

    const { data: existing } = await client
      .from("workshop_data")
      .select("id")
      .eq("participant_id", PARTICIPANT_ID)
      .eq("item_type", "list_meta")
      .eq("data->>owner_id", ownerId)
      .maybeSingle();

    if (!existing) {
      const ownerName = session.user.user_metadata?.display_name || session.user.email;
      await client.from("workshop_data").insert({
        participant_id: PARTICIPANT_ID,
        item_type: "list_meta",
        data: { owner_id: ownerId, owner_name: ownerName },
      });
    }
  }

  function updateAuthStatusBar() {
    const bar = document.getElementById("auth-status");
    if (session) {
      const myLink = `?list=${session.user.id}`;
      const goHome = LIST_ID === session.user.id
        ? ""
        : ` · <a href="${myLink}">Мой список</a>`;
      bar.innerHTML = `Вы вошли как ${escapeHtml(session.user.email)}${goHome} · <button class="link-btn" onclick="logout()">Выйти</button>`;
    } else {
      bar.innerHTML = `<a href="index.html">Войти в свой аккаунт</a>`;
    }
  }

  function render() {
    if (!LIST_ID) {
      if (session) {
        location.href = `?list=${session.user.id}`;
        return;
      }
      document.getElementById("home").hidden = false;
      document.getElementById("app").hidden = true;
      return;
    }

    document.getElementById("home").hidden = true;
    document.getElementById("app").hidden = false;

    isOwner = !!session && session.user.id === LIST_ID;
    document.getElementById("add-form").hidden = !isOwner;
    document.getElementById("share-box").hidden = !isOwner;
    if (isOwner) {
      document.getElementById("share-link").value = location.href;
    }

    updateAuthStatusBar();
    loadListTitle();
    loadItems();
  }

  async function loadListTitle() {
    const { data, error } = await client
      .from("workshop_data")
      .select("data")
      .eq("participant_id", PARTICIPANT_ID)
      .eq("item_type", "list_meta")
      .eq("data->>owner_id", LIST_ID)
      .maybeSingle();

    if (error) {
      console.error(error);
      return;
    }

    if (data) {
      document.getElementById("app-title").textContent = `🎁 Вишлист: ${data.data.owner_name}`;
    }
  }

  async function loadItems() {
    const { data, error } = await client
      .from("workshop_data")
      .select("*")
      .eq("participant_id", PARTICIPANT_ID)
      .eq("item_type", "gift")
      .eq("data->>owner_id", LIST_ID)
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    for (const row of data) {
      const g = row.data;
      const li = document.createElement("li");
      if (g.booked_by) li.classList.add("booked");

      const linkHtml = g.link
        ? `<br/><a class="item-link" href="${escapeAttr(g.link)}" target="_blank" rel="noopener">Посмотреть товар →</a>`
        : "";
      const priceHtml = g.price ? `<span class="item-price">— ${escapeHtml(g.price)}</span>` : "";
      const commentHtml = g.comment ? `<div class="item-comment">${escapeHtml(g.comment)}</div>` : "";

      let actionHtml;
      if (g.booked_by) {
        actionHtml = `
          <div class="row">
            <span class="booked-tag">Забронировано: ${escapeHtml(g.booked_by)}</span>
            <button onclick="cancelBooking('${row.id}')">Отменить бронь</button>
          </div>`;
      } else {
        actionHtml = `
          <div class="row">
            <input id="booker-${row.id}" placeholder="Ваше имя" />
            <button onclick="bookItem('${row.id}')">Забронировать</button>
          </div>`;
      }

      li.innerHTML = `
        <span class="item-name">${escapeHtml(g.name)}</span>${priceHtml}
        ${commentHtml}
        ${linkHtml}
        ${actionHtml}
      `;
      list.appendChild(li);
    }
  }

  async function addItem(event) {
    event.preventDefault();
    const name = document.getElementById("name").value.trim();
    const link = document.getElementById("link").value.trim();
    const price = document.getElementById("price").value.trim();
    const comment = document.getElementById("comment").value.trim();
    if (!name) return;

    const { error } = await client.from("workshop_data").insert({
      participant_id: PARTICIPANT_ID,
      item_type: "gift",
      data: { owner_id: LIST_ID, name, link, price, comment, booked_by: null },
    });

    if (error) {
      console.error(error);
      return;
    }

    document.getElementById("name").value = "";
    document.getElementById("link").value = "";
    document.getElementById("price").value = "";
    document.getElementById("comment").value = "";
    loadItems();
  }

  async function bookItem(id) {
    const input = document.getElementById(`booker-${id}`);
    const bookerName = input.value.trim();
    if (!bookerName) {
      input.focus();
      return;
    }

    const { data: rows, error: fetchError } = await client
      .from("workshop_data")
      .select("data")
      .eq("id", id)
      .single();

    if (fetchError) {
      console.error(fetchError);
      return;
    }

    const { error } = await client
      .from("workshop_data")
      .update({ data: { ...rows.data, booked_by: bookerName } })
      .eq("id", id);

    if (error) {
      console.error(error);
      return;
    }

    loadItems();
  }

  async function cancelBooking(id) {
    const { data: rows, error: fetchError } = await client
      .from("workshop_data")
      .select("data")
      .eq("id", id)
      .single();

    if (fetchError) {
      console.error(fetchError);
      return;
    }

    const { error } = await client
      .from("workshop_data")
      .update({ data: { ...rows.data, booked_by: null } })
      .eq("id", id);

    if (error) {
      console.error(error);
      return;
    }

    loadItems();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str ?? "";
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return escapeHtml(str).replaceAll('"', "&quot;");
  }

  init();
</script>
</body>
</html>
